services:
  - type: web
    name: kyrbi-backend
    env: node
    buildCommand: npm install
    startCommand: node index.js
    disks:
      - name: kyrbi-data
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: SQLITE_STORAGE
        value: /var/data/kyrbi.sqlite
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "true"
      - key: DATABASE_URL
        value: sqlite:/var/data/kyrbi.sqlite
      - key: BACKEND_URL
        fromService:
          name: kyrbi-backend
          type: web
          property: host
